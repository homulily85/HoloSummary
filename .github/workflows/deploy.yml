name: Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "HoloSummaryFrontend"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.16.0"
          cache: "npm"
          # Tells the setup-node action where to find the package-lock.json for caching
          cache-dependency-path: "./HoloSummaryFrontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./HoloSummaryFrontend
        run: npm ci

      - name: Build project
        working-directory: ./HoloSummaryFrontend
        run: npm run build -- --base=/HoloSummary/
        env:
          VITE_API_URL: ${{ secrets.VITE_BACKEND_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Include the submodule folder in the path to the build output
          path: "./HoloSummaryFrontend/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
